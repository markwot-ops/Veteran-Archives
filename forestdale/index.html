<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Veteran Archives">
<title>Veteran Archives — Holyoke, MA</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="../assets/app.css">
</head>
<body>

<div id="header">
  <div>
    <h1 id="site-title">Veteran Archives</h1>
    <div class="sub"><span id="site-sub"></span><span class="sub-home"> &nbsp;·&nbsp; <a class="home" href="../index.html">← All Sites</a></span></div>
    <div id="site-nav">
      <a class="nav-back" href="../index.html">← All Sites</a>
      <a class="nav-next" id="nav-next" href="../index.html">Next Site →</a>
    </div>
  </div>
  <div id="vet-count"></div>
</div>

<div id="main">
  <div id="map"></div>
  <button id="locate-me" type="button" title="Show my location" aria-label="Show my location"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="1.7" fill="currentColor" stroke="none"/><line x1="12" y1="1.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22.5"/><line x1="1.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22.5" y2="12"/></svg></button>
  <button id="sun-toggle" type="button" title="Sun mode" aria-label="Toggle sun mode"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><line x1="12" y1="1.8" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.2"/><line x1="1.8" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.2" y2="12"/><line x1="4.6" y1="4.6" x2="6.2" y2="6.2"/><line x1="17.8" y1="17.8" x2="19.4" y2="19.4"/><line x1="4.6" y1="19.4" x2="6.2" y2="17.8"/><line x1="17.8" y1="6.2" x2="19.4" y2="4.6"/></svg></button>
  <div id="findBanner">
    <button id="fb-close" type="button" aria-label="Close">×</button>
    <div id="fb-name"></div>
    <div id="fb-service"></div>
    <div id="dirBar"></div>
    <div class="fb-actions">
      <button id="fb-guide" type="button">◎ Guide me here</button>
      <button id="fb-details" type="button">Details</button>
    </div>
  </div>

  <div id="legend">
    <h4 id="leg-head">Honors<span class="all-hint">show all</span></h4>
    <div id="leg-distinct"></div>
  </div>

  <div id="sidebar">
    <div id="sheet-handle"><span class="hbar"></span><span class="sheet-hint">Search or browse the index</span></div>
    <div id="sidebar-top">
      <input id="search" type="text" placeholder="Search veterans…">
      <div id="era-filters"></div>
    </div>
    <div id="list-wrap">
      <div id="vet-list"><div id="pad-top"></div><div id="rows"></div><div id="pad-bot"></div></div>
      <div id="az-rail" title="Jump to a letter"></div>
    </div>
    <div id="no-results">No veterans found</div>
  </div>
</div>

<div id="popup">
  <div id="pbox">
    <button id="pclose" onclick="closePopup()">×</button>
    <img id="pphoto" src="" alt="">
    <div id="pphoto-ph">Resting Place Pending Geo-location</div>
    <div id="pextra"></div>
    <div id="pname"></div>
    <div id="pservice"></div>
    <div id="pflags"></div>
    <div id="pstory"></div>
      <div id="psrc"></div>
      <div id="pcontact"></div>
  </div>
</div>

<!-- Per-site data. This is the ONLY file that changes between sites. -->
<script src="data.js"></script>
<script src="../assets/app.js"></script>
</body>
</html>
