<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veteran Archives — Holyoke, MA</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Georgia,serif; background:#1a1a1a; color:#f0e8d8; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

#header {
  background:#0d0d0d; border-bottom:2px solid #6b3a1f;
  padding:10px 18px; display:flex; align-items:center;
  justify-content:space-between; flex-shrink:0; z-index:1000;
}
#header h1 { font-size:1.05rem; font-weight:normal; letter-spacing:0.08em; text-transform:uppercase; }
#header .sub { font-size:0.72rem; color:#888; margin-top:2px; }
#header .home { font-size:0.62rem; color:#CD853F; text-decoration:none; letter-spacing:0.06em; text-transform:uppercase; }
#header .home:hover { color:#f0c98a; }
#vet-count { font-size:0.85rem; color:#CD853F; letter-spacing:0.04em; }

#main { position:relative; flex:1; overflow:hidden; }
#map { position:absolute; inset:0; z-index:1; }

/* ERA LEGEND — bottom left */
#legend {
  position:absolute; bottom:14px; left:8px;
  background:rgba(8,8,8,0.9); border:1px solid #3a3a3a;
  border-radius:4px; padding:9px 11px; z-index:800;
  max-height:calc(100vh - 120px); overflow-y:auto; white-space:nowrap;
}
#legend h4 { font-size:0.52rem; text-transform:uppercase; letter-spacing:0.12em; color:#ccc; margin-bottom:7px; }
#legend h4.dist-head { margin-top:9px; border-top:1px solid #2c2c2c; padding-top:8px; }
.leg-row { display:flex; align-items:center; gap:7px; margin-bottom:5px; cursor:pointer; transition:opacity 0.15s; }
.leg-row:last-child { margin-bottom:0; }
.leg-row:hover { opacity:0.75; }
.leg-sym { width:13px; text-align:center; font-size:0.66rem; }
.leg-dot { width:7px; height:7px; border-radius:50%; box-shadow:0 0 4px var(--dc); background:var(--dc); flex-shrink:0; }
.leg-label { font-size:0.6rem; color:#d4c9b8; flex:1; padding-right:10px; }
.leg-count { font-size:0.56rem; color:#d4c9b8; min-width:18px; text-align:right; }
.leg-row.dimmed { opacity:0.28; }
.leg-row.era-row.selected .leg-label { color:#fff; font-weight:bold; }
.leg-row.dist.on .leg-label { color:#fff; font-weight:bold; letter-spacing:0.02em; }
.leg-row.dist.on { opacity:1; }
/* one honor chosen: the others step back so you can SEE which one you're in */
#leg-distinct.filtered .leg-row.dist { opacity:0.3; }
#leg-distinct.filtered .leg-row.dist.on { opacity:1; }
#leg-distinct.filtered .leg-row.dist.on .leg-count { color:#fff; }
.leg-row.dist.on .leg-sym { filter:brightness(1.7); }
#legend h4 { cursor:pointer; transition:color 0.15s; }
#legend h4:hover { color:#fff; }
#legend h4 .all-hint { float:right; font-size:0.46rem; letter-spacing:0.06em; color:#6f6a5e; text-transform:none; visibility:hidden; }
#legend:has(#leg-distinct.filtered) h4 .all-hint { visibility:visible; }
#legend h4:hover .all-hint { color:#c8b97a; }
@keyframes honorDotPulse {
  0%,100% { text-shadow:0 0 3px currentColor; transform:scale(1); }
  50%     { text-shadow:0 0 9px currentColor, 0 0 15px currentColor; transform:scale(1.35); }
}
.leg-row.dist.on .leg-sym { animation:honorDotPulse 1.1s ease-in-out infinite; display:inline-block; }
@keyframes honorMarkerPulse {
  0%,100% { box-shadow:0 0 6px 1px rgba(255,205,70,0.85); }
  50%     { box-shadow:0 0 16px 5px rgba(255,220,95,1); }
}
.hpulse { animation:honorMarkerPulse 1.1s ease-in-out infinite; }

/* SIDEBAR — right */
#sidebar {
  position:absolute; top:0; right:0; bottom:0; width:265px;
  background:rgba(10,10,10,0.93); border-left:1px solid #2a2a2a;
  display:flex; flex-direction:column; z-index:800; overflow:hidden;
}
#sidebar-top { padding:10px 11px 8px; border-bottom:1px solid #222; background:#0a0a0a; }
#search {
  width:100%; background:#1a1a1a; border:1px solid #3a3a3a; color:#f0e8d8;
  padding:6px 9px; font-family:Georgia,serif; font-size:0.8rem;
  border-radius:3px; margin-bottom:7px; outline:none;
}
#search:focus { border-color:#CD853F; }
#search::placeholder { color:#888; }
#era-filters { display:flex; flex-wrap:wrap; gap:3px; }
.dist-label { width:100%; font-size:0.5rem; text-transform:uppercase; letter-spacing:0.1em; color:#8a8272; margin:9px 0 3px; }
#distinction-filters { display:flex; flex-wrap:wrap; gap:3px; }
.dist-btn { display:inline-flex; align-items:center; gap:4px; padding:2px 6px; border-radius:2px; border:1px solid #3a3a3a; background:#161616; color:#cfc6b6; font-size:0.5rem; font-family:Georgia,serif; cursor:pointer; transition:border-color .15s, background .15s; }
.dist-btn .dc-dot { width:7px; height:7px; border-radius:50%; background:var(--dc); box-shadow:0 0 4px var(--dc); flex-shrink:0; }
.dist-btn .dc-n { color:#8a8272; }
.dist-btn:hover { background:#1e1e1e; }
.dist-btn.on { border-color:var(--dc); color:#fff; background:#232323; }
.dist-btn.on .dc-n { color:#cfc6b6; }
.era-btn {
  padding:3px 6px; border-radius:2px; border:2px solid transparent;
  font-size:0.5rem; cursor:pointer; font-family:Georgia,serif;
  color:white; text-shadow:0 1px 2px rgba(0,0,0,0.6);
  transition:opacity 0.2s, border-color 0.15s, filter 0.15s;
  opacity:0.32;
}
.era-btn.selected { opacity:1; border-color:#fff; filter:none; box-shadow:inset 0 0 0 999px rgba(0,0,0,0.2); }
.era-btn .eb-n { opacity:0.85; font-size:0.46rem; margin-left:1px; }

#list-wrap { flex:1; display:flex; min-height:0; }
#vet-list { overflow-y:auto; flex:1; padding:3px 0; overscroll-behavior:contain; will-change:scroll-position; }
/* A–Z rail: at 3,052 names the list cannot be browsed by scrolling. Click a letter, land on it. */
#az-rail {
  width:17px; flex-shrink:0; display:flex; flex-direction:column; justify-content:space-around;
  align-items:center; padding:3px 0; border-left:1px solid #1e1e1e; background:#0c0c0c;
  user-select:none; touch-action:none;
}
.az-l {
  font-family:Georgia,serif; font-size:0.5rem; line-height:1; color:#6a6355;
  cursor:pointer; width:100%; text-align:center; padding:1px 0; border-radius:2px;
}
.az-l:hover { color:#f0e8d8; background:#242424; }
.az-l.on { color:#CD853F; }
.az-l.dead { color:#2e2b26; cursor:default; }
.az-l.dead:hover { background:none; color:#2e2b26; }
#az-bubble {
  position:absolute; right:24px; z-index:900; pointer-events:none; display:none;
  background:#CD853F; color:#101010; font-family:Georgia,serif; font-size:0.95rem;
  width:26px; height:26px; border-radius:50%; text-align:center; line-height:26px;
  box-shadow:0 2px 8px rgba(0,0,0,0.7);
}
#vet-list::-webkit-scrollbar { width:4px; }
#vet-list::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
.vet-item {
  padding:6px 11px; cursor:pointer; border-bottom:1px solid #181818;
  display:flex; align-items:center; gap:7px; transition:background 0.1s;
  /* Windowed list: ROW_H in the script must match this exactly. */
  height:40px; box-sizing:border-box;
}
.vet-item.dragging, #vet-list.dragging { cursor:grabbing; }
.vet-item:hover { background:#1c1c1c; }
.vet-item.active { background:#000; border-left:3px solid #CD853F; padding-left:8px; }
.vet-item.active .v-name { color:#fff; text-shadow:0 0 4px rgba(255,255,255,0.9), 0 0 10px rgba(255,255,255,0.5); }
.vet-item.active .v-era { color:#fff; text-shadow:0 0 4px rgba(255,255,255,0.8); }
.vet-item.queued .v-name { color:#b9ad97; font-style:italic; }
@keyframes symPulse {
  0%   { filter:brightness(1.6); text-shadow:0 0 4px rgba(255,255,255,0.5); }
  50%  { filter:brightness(2.6); text-shadow:0 0 10px rgba(255,255,255,1), 0 0 20px rgba(255,255,255,0.8); }
  100% { filter:brightness(1.6); text-shadow:0 0 4px rgba(255,255,255,0.5); }
}
.vet-item.active .v-sym { animation:symPulse 1.1s ease-in-out infinite; display:inline-block; }
.v-sym { font-size:0.8rem; width:15px; text-align:center; flex-shrink:0; filter:brightness(1.55); }
.v-name { font-size:0.78rem; color:#d4c9b8; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.v-era { font-size:0.63rem; color:#777; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.v-badge-q { font-size:0.5rem; color:#6b5; letter-spacing:0.04em; }
#no-results { padding:18px; color:#555; font-size:0.8rem; text-align:center; display:none; }

/* POPUP */
#popup {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0); z-index:3000;
  pointer-events:none;
}
#popup.show { display:block; }  /* overlay stays pointer-events:none so the index underneath keeps scrolling */
#pbox {
  position:absolute;
  top:50%; right:275px;
  transform:translateY(-50%);
  background:#141414; border:1px solid #444; border-radius:6px;
  width:310px; max-height:78vh; overflow-y:scroll; scroll-behavior:smooth;
  padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.7);
  pointer-events:auto;
}
#pbox.center { right:auto; left:50%; transform:translate(-50%,-50%); }
#pclose {
  position:absolute; top:9px; right:12px;
  background:none; border:none; color:#888; font-size:1.5rem; cursor:pointer;
}
#pclose:hover { color:#fff; }
#pphoto { width:100%; max-height:340px; object-fit:contain; background:#0a0a0a; border-radius:4px; margin-bottom:12px; display:none; }
#pphoto-ph { display:none; width:100%; min-height:150px; border:1px dashed #4a4238; border-radius:4px; background:#0e0e0e; color:#8a8172; font-size:0.72rem; letter-spacing:0.05em; align-items:center; justify-content:center; text-align:center; margin-bottom:12px; padding:16px; }
#pphoto-ph.show { display:flex; }
#pname { font-size:1.05rem; color:#f0e8d8; margin-bottom:3px; }
#pservice { font-size:0.78rem; color:#CD853F; margin-bottom:9px; letter-spacing:0.04em; }
#pstory { font-size:0.78rem; color:#aaa; line-height:1.65; }
#pstory.queued { color:#8a8578; font-style:italic; }
    #psrc { font-size:0.66rem; color:#7d7768; line-height:1.55; margin-top:8px; font-style:italic; }
    #pcontact { font-size:0.72rem; color:#8f8a7d; line-height:1.6; margin-top:10px; }
#pflags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:9px; }
.fbadge { padding:3px 8px; border-radius:3px; font-size:0.68rem; font-weight:bold; }

@keyframes markerPulse {
  0%,100% { transform:scale(1); box-shadow:0 1px 5px rgba(0,0,0,0.8); }
  50% { transform:scale(1.25); box-shadow:0 0 12px rgba(255,255,255,0.7); }
}
.marker-pulse > div { animation:markerPulse 1s ease-in-out infinite; }
</style>

<!-- Every site's data, in order. Each file assigns window.VA; each shim below
     grabs it before the next one overwrites it. No fetch, no async, no eval. -->

<script>
/* ------------------------------------------------------------------
   Holyoke Veterans Honor Roll — the whole archive on one map of the city.
   EVERY honored man is always loaded. ?honor=X does not cut the data down;
   it only arrives with that honor lit in the Honors box, exactly as if you
   had clicked it there yourself. Click it again and all of them come back.
   ------------------------------------------------------------------ */
(function honorRollMap(){
  const honor = new URLSearchParams(location.search).get('honor');
  // MUST match DISTINCTION_ORDER in the shell below. A man carried here whose honor
  // the box cannot filter would sit on the map unreachable.
  const HONORS = new Set(['Medal of Honor','Distinguished Service Cross','Croix de Guerre','KIA',
    'Purple Heart','Distinguished Service Medal','Cited for Bravery','Air Medal','Silver Star',
    'Bronze Star','French Military Medal','British Military Medal']);
  const men = [];
  (window.SITES_DATA || []).forEach(({slug, label, VA}) => {
    ((VA && VA.veterans) || []).forEach(v => {
      if (!(v.badges || []).some(b => HONORS.has(b))) return;   // honored men only
      const c = Object.assign({}, v);
      c._site = slug;
      // photos are absolute raw URLs, so they travel unchanged; append where he lies.
      // Fall back to branch + era the way the shell would, or the label alone would
      // silently replace his service line.
      const era = Array.isArray(c.era) ? c.era.join(' \u00b7 ') : (c.era || '');
      const base = c.branchLabel || [c.branch, era].filter(Boolean).join(' \u2022 ');
      c.branchLabel = label
        ? (base ? base + ' \u2014 ' + label : label)
        : (base ? base + ' \u2014 resting place not yet known' : 'Resting place not yet known');
      men.push(c);
    });
  });
  const located = men.filter(v => typeof v.lat === 'number' && typeof v.lng === 'number').length;
  window.INIT_DISTINCTION = honor || null;     // the shell lights this row on load
  window.VA = {
    site: {
      name:  'Holyoke Veterans Honor Roll',
      title: honor || 'Holyoke Veterans Honor Roll',
      address: men.length + ' honored \u00b7 ' + located + ' located in Holyoke',
      kind: 'honor',
      center: [42.2043, -72.6162],   // the city, not one burial ground
      zoom: 13,
      nameField: 'bio'
    },
    veterans: men
  };
})();
</script>
<script>
/* ============================================================
   VETERAN ARCHIVES — canonical template.
   Identical for every site. All per-site content lives in data.js
   as window.VA = { site:{...}, veterans:[...] }.
   ============================================================ */
const SITE = (window.VA && window.VA.site) || {};
const veterans = (window.VA && window.VA.veterans) || [];
const IS_QUEUE = SITE.kind === 'queue';

const CONTACT_CLOSE = 'If you have further information about this veteran, please contact the City of Holyoke Veterans Graves Officer at (413) 322-5630 at 310 Appleton Street, 1st Floor, Holyoke, MA 01040.';
const QUEUE_TEXT = 'This veteran has been identified but is still in the research queue — a narrative has not yet been written. The entry is held here until research and grave location are complete.';

document.getElementById('site-title').textContent = SITE.title || SITE.name || 'Veteran Archives';
document.getElementById('site-sub').textContent = SITE.address || '';
document.title = (SITE.title || 'Veteran Archives') + ' — Holyoke, MA';

const ERA_COLORS = {
  'Civil War Era':'#8B4513',
  'Spanish-American War':'#CD853F',
  'World War I':'#4682B4',
  'World War II':'#2E8B57',
  'Korean War':'#9370DB',
  'Vietnam':'#DC143C',
  'Cold War':'#5f9ea0',
  'Unknown Era':'#666',
};
const ERA_ORDER = ['Civil War Era','Spanish-American War','World War I','World War II','Korean War','Vietnam','Cold War','Unknown Era'];

function normEra(raw) {
  if (!raw) return 'Unknown Era';
  const s = raw.trim();
  if (s.includes('Civil')) return 'Civil War Era';
  if (s.includes('Spanish')) return 'Spanish-American War';
  if (s.includes('Vietnam')) return 'Vietnam';
  if (s.includes('World War II')) return 'World War II';
  if (s.includes('World War I')) return 'World War I';
  if (s.includes('Korean')) return 'Korean War';
  if (s.includes('Cold War')) return 'Cold War';
  return 'Unknown Era';
}
function normEras(raw) {
  if (Array.isArray(raw)) {
    const seen = [];
    raw.forEach(r => { const e = normEra(r); if (!seen.includes(e)) seen.push(e); });
    const out = seen.filter(e => e !== 'Unknown Era');
    return out.length ? out.sort((a,b)=>ERA_ORDER.indexOf(a)-ERA_ORDER.indexOf(b)) : ['Unknown Era'];
  }
  return [normEra(raw)];
}
function eraLabel(raw) { return normEras(raw).join(' · '); }
function eraColor(raw) { return ERA_COLORS[normEras(raw)[0]] || '#666'; }

function branchSym(branch) {
  if (!branch) return '✦';
  const b = branch.toUpperCase();
  if (b.includes('NAVY')) return '⚓';
  if (b.includes('MARINE') || b.includes('USMC')) return '🦅';
  if (b.includes('AIR') || b.includes('USAF')) return '✈';
  if (b.includes('COAST')) return '⚑';
  if (b.includes('ARMY')) return '★';
  return '✦';
}

const map = L.map('map', {preferCanvas:true, minZoom:13, maxZoom:20})
  .setView(SITE.center || [42.2043,-72.6162], SITE.zoom || 15);

const satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {attribution:'© Esri', maxNativeZoom:19, maxZoom:20}
);
const street = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {attribution:'© CARTO', subdomains:'abcd', maxNativeZoom:19, maxZoom:20}
);
const terrain = L.tileLayer(
  'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
  {attribution:'© OpenTopoMap', subdomains:'abc', maxNativeZoom:17, maxZoom:20}
);
satellite.addTo(map);
L.control.layers({'Satellite':satellite,'Street':street,'Terrain':terrain},{},{position:'topleft'}).addTo(map);

let activeEras = new Set(ERA_ORDER);
let activeDistinction = (typeof window.INIT_DISTINCTION === 'string' && window.INIT_DISTINCTION) || null;
let markerMap = {};
let activeIdx = null;
let searchTerm = '';
let activeMarker = null;

// --- sidebar render state: sort once, render the whole index, let the browser skip what's offscreen ---
let SORTED = null;          // cached sorted index — built once, never re-sorted
let FILTERED = [];          // current filter/search result set
let searchTimer = null;     // debounce handle

// Major distinctions, most prestigious first. Each cemetery builds chips from whichever it actually has.
const DISTINCTION_ORDER = ['Medal of Honor','Distinguished Service Cross','Croix de Guerre','KIA','Purple Heart','Distinguished Service Medal','Cited for Bravery','Air Medal','Silver Star','Bronze Star','French Military Medal','British Military Medal'];
const DISTINCTION_COLORS = {
  'Medal of Honor':'#e6c14a','Distinguished Service Cross':'#9b7ede','Distinguished Service Medal':'#7c6fb0',
  'Silver Star':'#b9c0c7','Bronze Star':'#c99a3a','Air Medal':'#4a9be0','Purple Heart':'#a24bb3',
  'Croix de Guerre':'#4e8f63','KIA':'#c0392b','Cited for Bravery':'#c07a4a','British Military Medal':'#8a7d5b','French Military Medal':'#5b7f8a'
};
const DISTINCTION_SHORT = {};  // spell every distinction out in full
function canonBadge(b){ const low=(b||'').toLowerCase(); for(const n of DISTINCTION_ORDER){ if(n.toLowerCase()===low) return n; } return null; }
function vetDistinctions(v){ return (v.badges||[]).map(canonBadge).filter(Boolean); }
function isDistinguished(v){ return vetDistinctions(v).length>0; }
function passesFilters(v){ return normEras(v.era).some(e => activeEras.has(e)) && (!activeDistinction || vetDistinctions(v).includes(activeDistinction)); }

function hasCoords(v){ return v && v.lat!=null && v.lng!=null && !isNaN(v.lat) && !isNaN(v.lng); }

function buildMarkers() {
  Object.values(markerMap).forEach(m => map.removeLayer(m));
  markerMap = {};
  veterans.forEach((v, idx) => {
    if (!passesFilters(v)) return;
    if (!hasCoords(v)) return;
    const color = eraColor(v.era);
    const sym = branchSym(v.branch);
    const dist = isDistinguished(v);
    const isKIA = (v.badges||[]).some(b => (b||'').toLowerCase()==='kia');
    const rim = dist
      ? 'border:2px solid #ffd757;box-shadow:0 0 7px 1px rgba(255,205,70,0.85);'
      : 'border:2px solid rgba(255,255,255,0.65);box-shadow:0 1px 5px rgba(0,0,0,0.8);';
    const pulseCls = activeDistinction ? 'hpulse' : '';
    const star = isKIA ? '<div style="position:absolute;top:-9px;right:-7px;font-size:13px;color:#ffd54a;line-height:1;text-shadow:0 0 3px #000,0 0 6px rgba(255,210,70,0.9);pointer-events:none;">★</div>' : '';
    const icon = L.divIcon({
      className:'',
      html:`<div style="position:relative;width:26px;height:26px;">${star}<div class="${pulseCls}" style="width:26px;height:26px;border-radius:50%;background:${color};${rim}display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;">${sym}</div></div>`,
      iconSize:[26,26], iconAnchor:[13,13]
    });
    const m = L.marker([v.lat, v.lng], {icon});
    m.on('click', () => openPopup(v, idx));
    m.addTo(map);
    markerMap[idx] = m;
  });
}

function openPopup(v, idx) {
  if (activeMarker) activeMarker.getElement()?.classList.remove('marker-pulse');
  const queued = !((v.narrative||'').trim());
  document.getElementById('pname').textContent = v.name;
  document.getElementById('pservice').textContent =
    v.branchLabel || [v.branch, eraLabel(v.era)].filter(Boolean).join(' • ');
  const storyEl = document.getElementById('pstory');
  storyEl.textContent = queued ? QUEUE_TEXT : v.narrative;
  storyEl.classList.toggle('queued', queued);

  const srcEl = document.getElementById('psrc');
  srcEl.textContent = v.sourceNote || '';
  srcEl.style.display = v.sourceNote ? 'block' : 'none';

  const conEl = document.getElementById('pcontact');
  const showContact = !!v.sourceNote;              // legacy entries carry the close inside narrative
  conEl.textContent = showContact ? CONTACT_CLOSE : '';
  conEl.style.display = showContact ? 'block' : 'none';

  const photo = document.getElementById('pphoto');
  const ph = document.getElementById('pphoto-ph');
  if (v.photo) { photo.src = v.photo; photo.style.display = 'block'; ph.classList.remove('show'); }
  else if (!hasCoords(v)) { photo.style.display = 'none'; ph.classList.add('show'); }   // queue: pending geo-location
  else { photo.style.display = 'none'; ph.classList.remove('show'); }

  const extEl = document.getElementById('pextra');
  extEl.innerHTML = '';
  (v.extraPhotos||[]).forEach(ep => {
    const link = document.createElement('a');
    link.href = ep.src; link.target = '_blank';
    link.style.cssText = 'display:block;margin-bottom:10px;color:#c8b97a;font-size:0.82rem;text-decoration:none;border:1px solid #444;border-radius:6px;padding:8px 12px;background:#1a1a1a;';
    link.textContent = ep.caption || 'View document';
    extEl.appendChild(link);
  });

  const flagsEl = document.getElementById('pflags');
  flagsEl.innerHTML = '';
  const fs = {'KIA':['#8B0000','#fff'],'Purple Heart':['#7B2D8B','#fff'],'Bronze Star':['#B8860B','#fff'],'Air Medal':['#1a6abf','#fff'],'Female Veteran':['#C71585','#fff'],'Silver Star':['#71797E','#fff'],'Distinguished Service Cross':['#2c1b4d','#fff'],'Croix de Guerre':['#2d5a3d','#fff'],'Died in Service':['#5a3d2d','#fff'],'Medical Officer':['#2d5a5a','#fff'],'Retake Needed':['#333','#c99'],'Cited for Bravery':['#7a4a24','#fff'],'French Military Medal':['#2d4a55','#fff'],'British Military Medal':['#4a442d','#fff'],'Medal of Honor':['#8a6d16','#fff'],'Distinguished Service Medal':['#3d356b','#fff']};
  (v.badges||[]).forEach(f => {
    const [bg,fg] = fs[f]||['#444','#fff'];
    const b = document.createElement('span');
    b.className='fbadge'; b.style.background=bg; b.style.color=fg; b.textContent=f;
    flagsEl.appendChild(b);
  });

  // Window always sits left of the sidebar, so the index stays clear and scrollable.
  if (hasCoords(v)) {
    const clickedMarker = markerMap[idx];
    if (clickedMarker) { clickedMarker.getElement()?.classList.add('marker-pulse'); activeMarker = clickedMarker; }
    const mapW = map.getContainer().offsetWidth;
    const popupLeft = mapW - 275 - 310;
    const graveTargetX = popupLeft * 0.45;
    const currentCenter = map.project(map.getCenter(), map.getZoom());
    const gravePoint = map.project([v.lat, v.lng], map.getZoom());
    const currentGraveX = gravePoint.x - currentCenter.x + mapW / 2;
    const shiftX = currentGraveX - graveTargetX;
    const newCenter = map.unproject([currentCenter.x + shiftX, currentCenter.y], map.getZoom());
    map.panTo(newCenter, {animate:true, duration:0.7});
  }
  // else: queue / not-yet-located — no pin to pan to; the window still opens in place.

  document.querySelectorAll('.vet-item').forEach(el => el.classList.remove('active'));
  activeIdx = idx;
  // Under a windowed list the row may not exist yet — compute where it lives and
  // scroll there, then draw. Never rely on scrollIntoView for an undrawn row.
  const pos = FILTERED.findIndex(f => f.i === idx);
  if (pos >= 0) {
    const list = document.getElementById('vet-list');
    const top = pos * ROW_H, bot = top + ROW_H;
    if (top < list.scrollTop || bot > list.scrollTop + list.clientHeight) {
      list.scrollTop = Math.max(0, top - list.clientHeight / 2 + ROW_H / 2);
    }
    drawWindow(true);
  }
  document.getElementById('popup').classList.add('show');
}

function closePopup() {
  document.getElementById('popup').classList.remove('show');
  if (activeMarker) { activeMarker.getElement()?.classList.remove('marker-pulse'); activeMarker = null; }
  document.querySelectorAll('.vet-item').forEach(el => el.classList.remove('active'));
  activeIdx = null;
}
map.on('click', () => {
  if (document.getElementById('popup').classList.contains('show')) closePopup();
});

const SUF = /^(Sr|Jr|II|III|IV|MD)\.?$/i;
function sortKey(n){
  if(/^unknown/i.test(n)) return n;   // "Unknown Soldier N" -> sorts under U, in order
  return n.includes(',') ? n.split(',')[0].trim()
    : (() => { const w=n.split(' '); return SUF.test(w[w.length-1])?(w[w.length-2]||w[0]):w[w.length-1]; })();
}
function displayName(n){
  if(/^unknown/i.test(n)) return n;   // show as-is, don't reformat to "N, Unknown Soldier"
  return n.includes(',') ? n
    : (() => { const p=n.trim().split(/\s+/); return p.length>1 ? p[p.length-1]+', '+p.slice(0,-1).join(' ') : n; })();
}

function sortedList() {
  if (!SORTED) SORTED = veterans.map((v,i)=>({v,i})).sort((a,b)=>
    sortKey(a.v.name).localeCompare(sortKey(b.v.name)) || a.v.name.localeCompare(b.v.name));
  return SORTED;
}

function makeRow(v, idx) {
  const queued = !((v.narrative||'').trim());
  const el = document.createElement('div');
  el.className = 'vet-item' + (idx===activeIdx?' active':'') + (queued?' queued':'');
  el.dataset.i = idx;
  const q = queued ? `<div class="v-badge-q">\u25d4 queue</div>` : '';
  el.innerHTML = `<div class="v-sym" style="color:${eraColor(v.era)}">${branchSym(v.branch)}</div><div style="flex:1;min-width:0"><div class="v-name">${displayName(v.name)}</div><div class="v-era">${eraLabel(v.era)}</div></div>${q}`;
  el.dataset.idx = idx;
  return el;
}

// ---- windowed list -------------------------------------------------------
// Only the rows you can see exist. Above and below them sit two spacers holding
// the exact height of everything not drawn, so the scrollbar is honest and the
// cost of scrolling is the same at 40 names or 40,000.
const ROW_H = 40;            // MUST match .vet-item height in the CSS
const OVERSCAN = 8;          // rows drawn beyond each edge, so a fling doesn't flash blank
let winStart = -1, winEnd = -1, winQueued = false;

function ensureScaffold() {
  const list = document.getElementById('vet-list');
  if (document.getElementById('rows')) return list;
  list.replaceChildren();
  ['pad-top','rows','pad-bot'].forEach(id => {
    const d = document.createElement('div'); d.id = id; list.appendChild(d);
  });
  return list;
}

function drawWindow(force) {
  const list = ensureScaffold();
  const rows = document.getElementById('rows');
  const total = FILTERED.length;
  const visible = Math.ceil(list.clientHeight / ROW_H) + OVERSCAN * 2;
  let first = Math.max(0, Math.floor(list.scrollTop / ROW_H) - OVERSCAN);
  // If the list shortened under us (a filter, a search) the old scroll position can
  // point past the end. Never let that draw an empty window.
  if (first > Math.max(0, total - 1)) first = Math.max(0, total - visible);
  const last = Math.min(total, first + visible);
  if (!force && first === winStart && last === winEnd) return;
  winStart = first; winEnd = last;

  const frag = document.createDocumentFragment();
  for (let n = first; n < last; n++) frag.appendChild(makeRow(FILTERED[n].v, FILTERED[n].i));
  rows.replaceChildren(frag);
  document.getElementById('pad-top').style.height = (first * ROW_H) + 'px';
  document.getElementById('pad-bot').style.height = Math.max(0, (total - last) * ROW_H) + 'px';
  if (activeIdx !== null) {
    const el = rows.querySelector(`.vet-item[data-i="${activeIdx}"]`);
    if (el) el.classList.add('active');
  }
}

function renderMore() { winStart = winEnd = -1; drawWindow(true); }

// scroll drives the window, coalesced to one draw per frame
document.getElementById('vet-list').addEventListener('scroll', () => {
  if (winQueued) return;
  winQueued = true;
  requestAnimationFrame(() => { winQueued = false; drawWindow(false); });
}, {passive:true});
window.addEventListener('resize', () => drawWindow(true));

function buildSidebar() {
  const list = document.getElementById('vet-list');
  const none = document.getElementById('no-results');
  const term = searchTerm.toLowerCase();
  FILTERED = sortedList().filter(({v}) =>
    passesFilters(v) &&
    (!term || v.name.toLowerCase().includes(term) || (v.branch||'').toLowerCase().includes(term)));
  // Clear the drawn rows ONLY. Wiping #vet-list would destroy pad-top/rows/pad-bot
  // and the windowed list would never draw again.
  document.getElementById('rows').replaceChildren();
  list.scrollTop = 0;
  renderMore();
  buildRail();
  none.style.display = FILTERED.length===0 ? 'block' : 'none';
}

// --- one click handler for the whole index ---
document.getElementById('vet-list').addEventListener('click', e => {
  const row = e.target.closest('.vet-item');
  if (!row) return;
  const idx = +row.dataset.idx;
  const v = veterans[idx];
  if (!v) return;
  if (hasCoords(v)) { map.flyTo([v.lat, v.lng], 19, {duration:1.0}); setTimeout(() => openPopup(v, idx), 350); }
  else { openPopup(v, idx); }
});

// --- the A-Z rail: the Queue is 3,052 names. Scrolling cannot land on a man; this can. ---
const AZ = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let AZ_POS = {};   // letter -> first row index in FILTERED, rebuilt on every filter/search

function buildRail() {
  const rail = document.getElementById('az-rail');
  if (!rail) return;
  if (!rail.children.length) {
    const frag = document.createDocumentFragment();
    AZ.forEach(L => {
      const d = document.createElement('div');
      d.className = 'az-l'; d.textContent = L; d.dataset.l = L;
      frag.appendChild(d);
    });
    rail.appendChild(frag);
    const b = document.createElement('div');
    b.id = 'az-bubble'; document.getElementById('sidebar').appendChild(b);
  }
  AZ_POS = {};
  for (let n = 0; n < FILTERED.length; n++) {
    const L = sortKey(FILTERED[n].v.name).trim().charAt(0).toUpperCase();
    if (AZ_POS[L] === undefined) AZ_POS[L] = n;
  }
  rail.querySelectorAll('.az-l').forEach(el => {
    el.classList.toggle('dead', AZ_POS[el.dataset.l] === undefined);
  });
}

function jumpTo(L) {
  const pos = AZ_POS[L];
  if (pos === undefined) return false;
  const list = document.getElementById('vet-list');
  // A row for this man may not exist yet — never scrollIntoView an undrawn row.
  list.scrollTop = pos * ROW_H;
  drawWindow(true);
  const rail = document.getElementById('az-rail');
  rail.querySelectorAll('.az-l').forEach(el => el.classList.toggle('on', el.dataset.l === L));
  return true;
}

(function railControl(){
  const rail = document.getElementById('az-rail');
  if (!rail) return;
  const bubble = () => document.getElementById('az-bubble');
  let down = false;

  function letterAt(y) {
    const el = document.elementFromPoint(rail.getBoundingClientRect().left + 8, y);
    return (el && el.classList && el.classList.contains('az-l')) ? el : null;
  }
  function go(y) {
    const el = letterAt(y);
    if (!el || el.classList.contains('dead')) return;
    if (jumpTo(el.dataset.l)) {
      const b = bubble();
      if (b) {
        b.textContent = el.dataset.l;
        b.style.display = 'block';
        b.style.top = (el.getBoundingClientRect().top - rail.getBoundingClientRect().top + 3) + 'px';
      }
    }
  }
  rail.addEventListener('pointerdown', e => {
    down = true; rail.setPointerCapture(e.pointerId); go(e.clientY); e.preventDefault();
  });
  rail.addEventListener('pointermove', e => { if (down) go(e.clientY); });
  function up(){ down = false; const b = bubble(); if (b) b.style.display = 'none'; }
  rail.addEventListener('pointerup', up);
  rail.addEventListener('pointercancel', up);
})();

// --- the wheel: 1:1, no momentum. It stops when you stop. ---
(function wheelControl(){
  const list = document.getElementById('vet-list');
  if (!list) return;
  // Feel is a nicety; the index is not. Nothing in here may throw.
  const WHEEL_GAIN = 1.0;   // raise = further per notch. Lower = finer.
  const DRAG_CAP   = 60;    // fling ceiling, px/frame
  const FRICTION   = 0.86;  // fling coast-down

  let reduced = false;
  try { reduced = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches); } catch (e) {}

  let vel = 0, spinning = false;
  function brake(){ vel = 0; spinning = false; }
  function frame(){
    if (!spinning) return;
    const before = list.scrollTop;
    list.scrollTop += vel;
    vel *= FRICTION;
    if (list.scrollTop === before && Math.abs(vel) > 0.5) { brake(); return; }
    if (Math.abs(vel) < 0.6) { brake(); return; }
    requestAnimationFrame(frame);
  }

  // EVERY wheel event, whatever the device. No device sniffing — that was the bug.
  // We take the scroll off the browser so nothing coasts on after the hand stops.
  list.addEventListener('wheel', e => {
    let d = e.deltaY;
    if (e.deltaMode === 1) d *= ROW_H;                      // lines -> pixels
    else if (e.deltaMode === 2) d *= (list.clientHeight || 400);  // pages -> pixels
    if (!d) return;
    e.preventDefault();
    brake();                                                // a wheel touch also kills any fling
    list.scrollTop += d * WHEEL_GAIN;
  }, {passive:false});

  if (reduced) return;   // system says no motion: keep the 1:1 wheel, skip the fling

  // --- grab the index and fling it, like spinning a wheel by hand ---
  let down = false, dragged = false, braked = false, lastY = 0, lastT = 0, track = 0;
  list.addEventListener('pointerdown', e => {
    if (e.pointerType === 'touch') return;   // touch already has native momentum
    braked = spinning || Math.abs(vel) > 0;  // touching a spinning list = stop it, nothing else
    brake();
    down = true; dragged = false;
    lastY = e.clientY; lastT = e.timeStamp; track = 0;
  });
  list.addEventListener('pointermove', e => {
    if (!down) return;
    const dy = e.clientY - lastY;
    const dt = Math.max(1, e.timeStamp - lastT);
    track += Math.abs(dy);
    if (track > 4) {                          // past this, it's a drag not a click
      if (!dragged) { dragged = true; list.classList.add('dragging'); list.setPointerCapture(e.pointerId); }
      list.scrollTop -= dy;
      vel = vel * 0.6 + (-dy / dt * 16) * 0.4;
    }
    lastY = e.clientY; lastT = e.timeStamp;
  });
  list.addEventListener('pointerup', e => {
    down = false;
    list.classList.remove('dragging');
    if (!dragged) { setTimeout(() => { braked = false; }, 0); return; }
    vel = Math.max(-DRAG_CAP, Math.min(DRAG_CAP, vel));
    if (Math.abs(vel) > 1 && !spinning) { spinning = true; requestAnimationFrame(frame); }
    setTimeout(() => { dragged = false; braked = false; }, 0);
  });
  list.addEventListener('pointercancel', () => { down = false; dragged = false; braked = false; list.classList.remove('dragging'); });
  // a fling must not also open whoever was under your cursor — nor must the tap that stopped one
  list.addEventListener('click', e => { if (dragged || braked) { e.stopPropagation(); e.preventDefault(); } }, true);
  list.addEventListener('touchstart', () => { brake(); }, {passive:true});
})();

function updateCount() {
  const showing = veterans.filter(passesFilters).length;
  const total = veterans.length;
  const label = IS_QUEUE ? 'In the Research Queue' : 'Documented Veterans';
  document.getElementById('vet-count').textContent =
    showing === total ? `${total} ${label}` : `${showing} of ${total}`;
}

const eraCounts = {};
veterans.forEach(v => { normEras(v.era).forEach(e => { eraCounts[e]=(eraCounts[e]||0)+1; }); });

// Era filters (with counts) live above the names in the sidebar.
const filterDiv = document.getElementById('era-filters');
ERA_ORDER.forEach(era => {
  if (!eraCounts[era]) return;
  const short = era.replace(' Era','').replace('World War ','WW').replace('Korean War','Korea');
  const btn = document.createElement('button');
  btn.className='era-btn selected'; btn.style.background=ERA_COLORS[era]; btn.dataset.era=era;
  btn.innerHTML=`${short} <span class="eb-n">${eraCounts[era]}</span>`;
  btn.addEventListener('click', () => {
    if (activeDistinction) { activeDistinction = null; document.querySelectorAll('.leg-row.dist').forEach(r => r.classList.remove('on')); }
    if (btn.classList.contains('selected')) {
      btn.classList.remove('selected'); activeEras.delete(era);   // darken → those vets fall off
    } else {
      btn.classList.add('selected'); activeEras.add(era);          // re-light → they come back
    }
    buildMarkers(); buildSidebar(); updateCount();
  });
  filterDiv.appendChild(btn);
});

// Distinctions — fill the bottom-left box; hide it entirely if this site has none.
const distCounts = {};
veterans.forEach(v => vetDistinctions(v).forEach(d => distCounts[d] = (distCounts[d]||0)+1));
const legDistinct = document.getElementById('leg-distinct');
if (!Object.keys(distCounts).length) {
  document.getElementById('legend').style.display = 'none';
} else {
  DISTINCTION_ORDER.forEach(d => {
    if (!distCounts[d]) return;
    const row = document.createElement('div');
    row.className = 'leg-row dist'; row.dataset.dist = d;
    row.style.setProperty('--dc', DISTINCTION_COLORS[d] || '#888');
    const dotHtml = (d==='KIA')
      ? `<div class="leg-sym" style="color:#e6c14a;font-size:0.7rem;text-shadow:0 0 4px rgba(230,193,74,0.7)">★</div>`
      : `<div class="leg-sym" style="color:${DISTINCTION_COLORS[d]||'#888'};font-size:0.55rem">●</div>`;
    row.innerHTML = `${dotHtml}<div class="leg-label">${DISTINCTION_SHORT[d]||d}</div><div class="leg-count">${distCounts[d]}</div>`;
    row.addEventListener('click', () => {
      if (activeDistinction === d) { activeDistinction = null; row.classList.remove('on'); }
      else {
        activeDistinction = d;
        document.querySelectorAll('.leg-row.dist').forEach(r => r.classList.remove('on'));
        row.classList.add('on');
        activeEras = new Set(ERA_ORDER);
        document.querySelectorAll('.era-btn').forEach(b => b.classList.add('selected'));
      }
      legDistinct.classList.toggle('filtered', !!activeDistinction);
      buildMarkers(); buildSidebar(); updateCount();
    });
    legDistinct.appendChild(row);
  });
  // arrived with an honor already chosen? light it. If it isn't in this box, drop it
  // rather than show an empty map with no lit row to explain why.
  if (activeDistinction) {
    let found = null;
    legDistinct.querySelectorAll('.leg-row.dist').forEach(r => { if (r.dataset.dist === activeDistinction) found = r; });
    if (found) found.classList.add('on'); else activeDistinction = null;
    legDistinct.classList.toggle('filtered', !!activeDistinction);
  }
  // the word Honors is the way back to all of them
  const head = document.getElementById('leg-head');
  if (head) head.addEventListener('click', () => {
    activeDistinction = null;
    legDistinct.querySelectorAll('.leg-row.dist').forEach(r => r.classList.remove('on'));
    legDistinct.classList.remove('filtered');
    buildMarkers(); buildSidebar(); updateCount();
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(buildSidebar, 120);
});
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key==='Enter') {
    const term = e.target.value.toLowerCase();
    const idx = veterans.findIndex(v => v.name.toLowerCase().includes(term));
    if (idx>=0) {
      const match = veterans[idx];
      if (hasCoords(match)) { map.flyTo([match.lat, match.lng], 19, {duration:1.0}); setTimeout(() => openPopup(match, idx), 350); }
      else { openPopup(match, idx); }
    }
  }
});

updateCount();
buildMarkers();
buildSidebar();
</script>
